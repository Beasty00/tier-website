[build]
  command = "npm run build"
  publish = ".next"

# The Next.js adapter is auto-detected by Netlify — no [[plugins]] entry needed.
# NEXT_PUBLIC_API_URL, NEXT_PUBLIC_SITE_URL, NEXT_PUBLIC_DISCORD_INVITE, and
# NEXT_PUBLIC_SERVER_IP must be set as Environment Variables in the Netlify
# dashboard (Site configuration -> Environment variables), pointing at wherever
# the Express API (server/) ends up hosted.
